<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Alaktive</title>
</head>
<body>

  <main>
    <article class="card" data-testid="test-todo-card">

      <header class="header">
        <span
          class="priority-indicator"
          data-testid="test-todo-priority-indicator"
          aria-hidden="true"
        ></span>

        <h2 class="title" data-testid="test-todo-title">
          Design Landing Page
        </h2>

        <span
          class="priority"
          data-testid="test-todo-priority"
          data-priority="high"
          aria-label="High priority"
        >
          High
        </span>
      </header>

      <section
        class="collapsible-section"
        data-testid="test-todo-collapsible-section"
        id="todo-collapsible"
      >
        <p class="description" data-testid="test-todo-description">
          Create a clean and modern landing page design for the new product launch.
        </p>

        <button
          class="expand-toggle"
          type="button"
          data-testid="test-todo-expand-toggle"
          aria-expanded="false"
          aria-controls="todo-collapsible"
          hidden
        >
          Show more
        </button>
      </section>

      <section class="status-section">
        <span class="status" data-testid="test-todo-status" data-status="pending">
          Pending
        </span>

        <select
          class="status-control"
          data-testid="test-todo-status-control"
          aria-label="Change task status"
        >
          <option value="pending">Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </section>

      <section class="dates">
        <time
          class="due-date"
          datetime="2026-04-19T18:00:00Z"
          data-testid="test-todo-due-date"
        >
          Due April 19, 2026
        </time>

        <span
          class="overdue-indicator"
          data-testid="test-todo-overdue-indicator"
          role="status"
          aria-live="polite"
          hidden
        >
          Overdue
        </span>

        <time
          class="time-remaining"
          datetime="2026-04-19T18:00:00Z"
          data-testid="test-todo-time-remaining"
          aria-live="polite"
        >
          Due in 3 days
        </time>
      </section>

      <section class="tags-section">
        <ul class="tags" role="list" data-testid="test-todo-tags">
          <li class="tag tag--work" data-testid="test-todo-tag-work">Work</li>
          <li class="tag tag--urgent" data-testid="test-todo-tag-urgent">Urgent</li>
          <li class="tag tag--team" data-testid="test-todo-tag-team">Team</li>
        </ul>
      </section>

      <section class="edit-form" data-testid="test-todo-edit-form">

        <label for="edit-title">Title
          <input
            id="edit-title"
            class="edit-title"
            type="text"
            data-testid="test-todo-edit-title-input"
            hidden
          />
        </label>

        <label for="edit-description">Description
          <textarea
            id="edit-description"
            class="edit-description"
            data-testid="test-todo-edit-description-input"
            hidden
          ></textarea>
        </label>

        <label for="edit-priority">Priority
          <select
            id="edit-priority"
            class="edit-priority"
            data-testid="test-todo-edit-priority-select"
            hidden
          >
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </label>

        <label for="edit-due-date">Due Date
          <input
            id="edit-due-date"
            class="edit-due-date"
            type="datetime-local"
            data-testid="test-todo-edit-due-date-input"
            hidden
          />
        </label>

      </section>

      <footer class="footer">
        <div class="complete">
          <input
            type="checkbox"
            id="todo-complete"
            class="complete-toggle"
            data-testid="test-todo-complete-toggle"
          />
          <label for="todo-complete">Mark task as complete</label>
        </div>

        <div class="actions">
          <button
            class="edit-btn"
            type="button"
            data-testid="test-todo-edit-button"
            aria-label="Edit task"
          >
            Edit
          </button>

          <button
            class="delete-btn"
            type="button"
            data-testid="test-todo-delete-button"
            aria-label="Delete task"
          >
            Delete
          </button>

          <button
            class="save-btn"
            type="button"
            data-testid="test-todo-save-button"
            aria-label="Save task"
            hidden
          >
            Save
          </button>

          <button
            class="cancel-btn"
            type="button"
            data-testid="test-todo-cancel-button"
            aria-label="Cancel edit"
            hidden
          >
            Cancel
          </button>
        </div>
      </footer>

    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
