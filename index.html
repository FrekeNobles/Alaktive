<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Alaktive</title>
</head>
<body>

  <main>
    <article data-testid="test-todo-card">

      <header>
        <h2 data-testid="test-todo-title">
          Design Landing Page
        </h2>

        <span 
          data-testid="test-todo-priority" 
          aria-label="High priority"
        >
          High
        </span>
      </header>

      <p data-testid="test-todo-description">
        Create a clean and modern landing page design for the new product launch.
      </p>
 
      <section>
        <span data-testid="test-todo-status">
          Pending
        </span>
      </section>

      <section>
        <time 
          datetime="2026-04-19T18:00:00Z" 
          data-testid="test-todo-due-date"
        >
          Due April 19, 2026
        </time>

        <time 
          data-testid="test-todo-time-remaining"
          aria-live="polite"
        >
          Due in 3 days
        </time>
      </section>

    
      <section>
        <ul role="list" data-testid="test-todo-tags">
          <li data-testid="test-todo-tag-work">Work</li>
          <li data-testid="test-todo-tag-urgent">Urgent</li>
          <li data-testid="test-todo-tag-team">Team</li>
        </ul>
      </section>

     
      <footer>
        <div>
          <input 
            type="checkbox" 
            id="todo-complete" 
            data-testid="test-todo-complete-toggle"
          />
          <label for="todo-complete">Mark task as complete</label>
        </div>

        <div>
                <button 
            data-testid="test-todo-edit-button"
            aria-label="Edit task"
            onclick="alert('This would open edit modal')"
            >
            Edit
            </button>

            <button 
            data-testid="test-todo-delete-button"
            aria-label="Delete task"
            onclick="alert('Are you sure you want to delete this task?')"
            >
            Delete
            </button>
        </div>
      </footer>

    </article>
  </main>

</body>
</html>
