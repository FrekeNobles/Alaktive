<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <title>Alaktive</title>
</head>
<body>

  <main>
    <article class="card" data-testid="test-todo-card">

      <!-- HEADER -->
      <header class="header">

        <!-- Priority Indicator -->
        <span
          class="priority-indicator"
          data-testid="test-todo-priority-indicator"
          aria-hidden="true"
        ></span>

        <!-- TITLE -->
        <div class="title-group">
          <h2 class="title" data-testid="test-todo-title">
            Design Landing Page
          </h2>

          <input
            type="text"
            class="edit-title"
            data-testid="test-todo-edit-title-input"
            aria-label="Edit title"
          />
        </div>

        <!-- PRIORITY -->
        <div class="priority-group">
          <span
            class="priority"
            data-testid="test-todo-priority"
            data-priority="high"
            aria-label="High priority"
          >
            High
          </span>

          <select
            class="edit-priority"
            data-testid="test-todo-edit-priority-select"
            aria-label="Edit priority"
          >
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

      </header>

      <!-- DESCRIPTION -->
      <section
        class="collapsible-section"
        id="todo-collapsible"
        data-testid="test-todo-collapsible-section"
      >
        <div class="description-group">
          <p class="description" data-testid="test-todo-description">
            Create a clean and modern landing page design for the new product launch.
          </p>

          <textarea
            class="edit-description"
            data-testid="test-todo-edit-description-input"
            aria-label="Edit description"
          ></textarea>
        </div>
      </section>

      <!-- EXPAND TOGGLE -->
      <button
        class="expand-toggle"
        type="button"
        data-testid="test-todo-expand-toggle"
        aria-expanded="false"
        aria-controls="todo-collapsible"
        hidden
      >
        Show more
      </button>

      <!-- STATUS -->
      <section class="status-section">

        <span
          class="status"
          data-testid="test-todo-status"
          data-status="pending"
        >
          Pending
        </span>

        <select
          class="status-control"
          data-testid="test-todo-status-control"
          aria-label="Change task status"
        >
          <option value="pending">Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
        </select>

      </section>

      <!-- DATES -->
      <section class="dates">

        <div class="date-group">
          <time
            class="due-date"
            datetime="2026-04-19T18:00:00Z"
            data-testid="test-todo-due-date"
          >
            Due April 19, 2026
          </time>

          <input
            type="datetime-local"
            class="edit-due-date"
            data-testid="test-todo-edit-due-date-input"
            aria-label="Edit due date"
          />
        </div>

        <span
          class="overdue-indicator"
          data-testid="test-todo-overdue-indicator"
          hidden
        >
          Overdue
        </span>

        <time
          class="time-remaining"
          data-testid="test-todo-time-remaining"
          aria-live="polite"
        >
          Due in 3 days
        </time>

      </section>

      <!-- TAGS -->
      <section class="tags-section">
        <ul class="tags" role="list" data-testid="test-todo-tags">
          <li class="tag tag--work" data-testid="test-todo-tag-work">Work</li>
          <li class="tag tag--urgent" data-testid="test-todo-tag-urgent">Urgent</li>
          <li class="tag tag--team" data-testid="test-todo-tag-team">Team</li>
        </ul>
      </section>

      <!-- EDIT FORM WRAPPER (for spec compliance only) -->
      <section
        class="edit-form"
        data-testid="test-todo-edit-form"
        aria-hidden="true"
      ></section>

      <!-- FOOTER -->
      <footer class="footer">

        <!-- CHECKBOX -->
        <div class="complete">
          <input
            type="checkbox"
            id="todo-complete"
            class="complete-toggle"
            data-testid="test-todo-complete-toggle"
          />
          <label for="todo-complete">Mark task as complete</label>
        </div>

        <!-- ACTIONS -->
        <div class="actions">

          <button
            class="edit-btn"
            type="button"
            data-testid="test-todo-edit-button"
          >
            Edit
          </button>

          <button
            class="delete-btn"
            type="button"
            data-testid="test-todo-delete-button"
          >
            Delete
          </button>

          <button
            class="save-btn"
            type="button"
            data-testid="test-todo-save-button"
          >
            Save
          </button>

          <button
            class="cancel-btn"
            type="button"
            data-testid="test-todo-cancel-button"
          >
            Cancel
          </button>

        </div>

      </footer>

    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
